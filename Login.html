<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CvSU Imus — Organizational Blockchain</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<script src="blockchain.js"></script> 
<style>
:root{ --panel-width: 820px; --panel-bg: rgba(20,24,31,0.65); --accent: #2ea3ff; --text-light: #000; }
*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;}
.bg{position:fixed;inset:0;background-image:url('Kabsu2.png');background-size:cover;background-position:center;filter:brightness(0.95) saturate(0.9);z-index:-3;}
.page{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:28px 18px;}
header{margin-top:10px;text-align:center}
header h1{margin:0;font-size:36px;color:#000;font-weight:800}
header p{margin:6px 0 22px;color:#000;font-weight:600;font-size:13px}
.panel{width:min(var(--panel-width),calc(100% - 48px));background:var(--panel-bg);border-radius:12px;padding:34px;display:flex;gap:28px;align-items:center;backdrop-filter:blur(6px);box-shadow:0 10px 30px rgba(12,18,28,0.45);border:1px solid rgba(255,255,255,0.06);}
.logo-wrap{flex:0 0 260px;display:flex;align-items:center;justify-content:center}
.logo{width:200px;height:200px;object-fit:contain;border-radius:12px;}
.controls{flex:1;min-width:220px;color:#ffffff;}
.search select{width:100%;padding:12px 14px;border-radius:999px;border:none;background:rgba(255,255,255,0.9);font-weight:600;color: #333;}
.btn{margin-top:15px;padding:12px 16px;border-radius:999px;border:none;background:#2563eb;color:white;font-weight:700;cursor:pointer;width:100%;transition:0.3s;}
.btn:hover {background: #1d4ed8;}
.auth-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);justify-content:center;align-items:center;z-index:9999;color: #000;}
.auth-box{background:white;padding:30px;width:360px;border-radius:12px;position:relative;}
.auth-box input{width:100%;padding:10px;margin:8px 0 14px;border-radius:6px;border:1px solid #ddd;}
.close-btn{position:absolute;top:8px;right:12px;font-size:22px;cursor:pointer;}
@media (max-width:800px){.panel{flex-direction:column}.logo{width:150px;height:150px}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="page">
<header><h1>WELCOME TO</h1><p>CAVITE STATE UNIVERSITY - IMUS CAMPUS • ORGANIZATIONAL BLOCKCHAIN</p></header>
<main class="panel">
 <div class="logo-wrap"><img src="KabsuLogo.png" class="logo"></div>
 <div class="controls">
 <h2>Search Student Organization</h2>
 <div class="search">
 <select id="dynamicOrgSelect" onchange="if(this.value) window.location.href=this.value"><option value="">Loading Organizations...</option></select>
 </div>
 <button id="connectBtn" onclick="loginWithMetaMask()" class="btn" style="background: #f6851b;">Organizations MetaMask</button>
 <p style="text-align:center; color:white; font-size:13px; margin-top:12px;">New Organization? <a onclick="openAuth()" style="color:#2ea3ff; text-decoration:underline; cursor:pointer;">Register Here</a></p>
 </div>
</main>
</div>

<div id="authModal" class="auth-modal">
  <div class="auth-box">
    <span class="close-btn" onclick="closeAuth()">&times;</span>
    <h2 style="text-align:center;">Register Organization</h2>
    <p style="text-align:center;font-size:13px;color:#666;">Link your MetaMask Wallet to create an account.</p>
    <input id="regTicker" placeholder="Org Ticker (e.g. CSG)"><input id="regOrgName" placeholder="Full Organization Name">
    <button class="btn" style="background:#f6851b;" onclick="registerWithWallet()">Register with MetaMask</button>
  </div>
</div>

<script>
function openAuth(){ document.getElementById("authModal").style.display="flex"; }
function closeAuth(){ document.getElementById("authModal").style.display="none"; }
window.onload = function() { populateOrgDropdown(); }
</script>
</body>
</html>
